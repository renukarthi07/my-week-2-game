<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Dart Dodge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="game-shell">
      <h1>Cosmic Dart Dodge</h1>
      <p>Hold the up arrow to fly upward. Let go to fall and dodge blocks and spikes.</p>
      <canvas id="gameCanvas" width="900" height="520"></canvas>
      <div class="hud">
        <span id="score">Score: 0</span>
        <span id="best">Best: 0</span>
        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
